name: DEV API app-dev-apicalypso Construye y despliega

on:
#   push:
#     branches:
#       - main
#     paths:
#         - 'src/apicalypso/**'
        
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: 'ubuntu-latest'
    environment: 'development'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v5
      with:
        context: ./src/apicalypso
        push: true
        tags: ${{ secrets.ACR_SERVER }}/apicalypso:${{ github.sha }}
        file: ./src/apicalypso/dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: 'development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.APP_NAME_001}}
        slot-name: 'production'
        publish-profile: ${{ secrets.PUBLISHPROFILE_DEV_001 }}
        images: '${{ secrets.ACR_SERVER }}/apicalypso:${{ github.sha }}'